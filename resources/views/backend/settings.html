<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interior Studio Admin - Website Settings</title>
  <link rel="shortcut icon" href="images/favicon.png">
  <link rel="stylesheet" href="assets/css/style88f9.css?v1.1.3">
  <link rel="stylesheet" href="assets/css/interior-admin.css">
</head>
<body class="nk-body interior-admin-page">
  <div class="ia-shell">
    <aside class="ia-sidebar">
      <a class="ia-brand" href="index.html"><span class="ia-brand-mark">IS</span><span><strong>Interior Studio</strong><small>Admin Panel</small></span></a>
      <nav class="ia-menu">
        <a href="index.html"><em class="icon ni ni-dashboard"></em>Dashboard</a>
        <a href="banners.html"><em class="icon ni ni-img"></em>Banner Management</a>
        <a href="testimonials.html"><em class="icon ni ni-chat-circle"></em>Testimonials</a>
        <a href="services.html"><em class="icon ni ni-setting"></em>Services</a>
        <a href="projects.html"><em class="icon ni ni-building"></em>Projects</a>
        <a href="gallery.html"><em class="icon ni ni-grid-alt"></em>Gallery</a>
        <a href="blogs.html"><em class="icon ni ni-file-text"></em>Blogs</a>
        <a class="active" href="settings.html"><em class="icon ni ni-setting-alt"></em>Settings</a>
      </nav>
    </aside>
    <main class="ia-main">
      <header class="ia-topbar">
        <button class="ia-menu-toggle" type="button" aria-label="Toggle menu"><em class="icon ni ni-menu"></em></button>
        <div><p class="ia-kicker">Website configuration</p><h1>Website Settings</h1></div>
        <button class="btn ia-btn-gold" type="button"><em class="icon ni ni-save"></em><span>Save Settings</span></button>
      </header>
      <div class="card ia-card">
        <div class="card-body">
          <form class="ia-form-grid">
            <div class="full">
              <label class="form-label">Website Logo</label>
              <input class="form-control ia-preview-input" type="file" accept="image/*" data-preview="settingsLogoPreview">
              <div class="ia-upload-preview mt-2" id="settingsLogoPreview"><img src="images/preview/a.jpg" alt="Website logo preview"></div>
            </div>
            <div><label class="form-label">Website Name</label><input class="form-control" type="text" value="Interior Studio"></div>
            <div><label class="form-label">Phone Number</label><input class="form-control" type="text" value="+91 98765 43210"></div>
            <div><label class="form-label">Email Address</label><input class="form-control" type="email" value="hello@interiorstudio.com"></div>
            <div><label class="form-label">Instagram Link</label><input class="form-control" type="text" value="https://instagram.com/interiorstudio"></div>
            <div><label class="form-label">Facebook Link</label><input class="form-control" type="text" value="https://facebook.com/interiorstudio"></div>
            <div><label class="form-label">LinkedIn Link</label><input class="form-control" type="text" value="https://linkedin.com/company/interiorstudio"></div>
            <div class="full"><label class="form-label">Address</label><textarea class="form-control" rows="3">502, Design House, Linking Road, Mumbai, Maharashtra</textarea></div>
            <div class="full"><label class="form-label">Footer Description</label><textarea class="form-control" rows="4">A premium interior design studio creating warm, functional, detail-rich homes and commercial spaces.</textarea></div>
          </form>
          <div class="ia-form-actions mt-4">
            <a class="btn btn-outline-dark" href="index.html">Cancel</a>
            <button class="btn ia-btn-gold" type="button"><em class="icon ni ni-save"></em><span>Save Settings</span></button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/bundle88f9.js?v1.1.3"></script>
  <script src="assets/js/scripts88f9.js?v1.1.3"></script>
  <script src="assets/js/interior-admin.js"></script>
</body>
</html>
